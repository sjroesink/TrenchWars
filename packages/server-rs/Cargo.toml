[package]
name = "trenchwars-server"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_repr = "0.1"
uuid = { version = "1", features = ["v4"] }
rand = "0.9"
bytes = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
futures = "0.3"
wtransport = "0.7"
